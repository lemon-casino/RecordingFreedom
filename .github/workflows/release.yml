name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25.0"
  NODE_VERSION: "24"
  WAILS_VERSION: "v3.0.0-alpha2.109"
  APP_DIR: app
  RNNOISE_TAG: rnnoise_dynamic

jobs:
  validate:
    name: Release Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        run: |
          go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npx playwright install --with-deps chromium

      - name: Generate Wails bindings
        working-directory: ${{ env.APP_DIR }}
        run: wails3 generate bindings -ts -i -f "-tags gtk3"

      - name: Verify generated bindings are committed
        working-directory: ${{ env.APP_DIR }}
        run: git diff --exit-code -- frontend/bindings

      - name: Build frontend
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run build

      - name: Run frontend e2e
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run test:e2e

      - name: Clean frontend e2e artifacts before Go tests
        working-directory: ${{ env.APP_DIR }}
        run: rm -rf frontend/test-results frontend/playwright-report

      - name: Test Go packages
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          set -o pipefail
          set +e
          go test -tags gtk3 ./... 2>&1 | tee go-test.log
          status="${PIPESTATUS[0]}"
          set -e
          if [ "${status}" -ne 0 ]; then
            {
              echo "### Go test failure"
              echo '```text'
              tail -200 go-test.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            message="$(tail -50 go-test.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
            echo "::error title=Go test failed::${message}"
            exit "${status}"
          fi

      - name: Build RNNoise dynamic module
        shell: bash
        run: bash ./scripts/build-rnnoise-unix.sh --platform linux --arch x64 --force

      - name: Test RNNoise dynamic DSP
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go test -tags "${RNNOISE_TAG}" ./internal/audio/rnnoise ./internal/recording

      - name: Run preview smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run -tags gtk3 ./cmd/preview-smoke

      - name: Run OCR translation smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run -tags gtk3 ./cmd/ocr-translation-smoke

      - name: Run OCR secret store smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run ./cmd/ocr-secret-store-smoke

      - name: Prepare Linux FFmpeg tools for PIP export smoke
        run: ./scripts/ensure-unix-ffmpeg.sh --platform linux --arch x64 --force

      - name: Run PIP export pixel smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run -tags gtk3 ./cmd/pip-export-smoke -synthetic -width 640 -height 360 -duration 1s

      - name: Verify release workflow gates
        working-directory: ${{ env.APP_DIR }}
        run: go run ./cmd/release-config-check

      - name: Run desktop dependency doctor
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go run -tags "gtk3 ${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            platform: windows
            arch: amd64
            ffmpeg_arch: x64
            cgo_enabled: "0"
            rnnoise_dynamic: "true"
            windows_msystem: MINGW64
            windows_msys_package: mingw-w64-x86_64-gcc
            windows_cc_subdir: mingw64
            windows_cc_exe: gcc.exe
            nsis_arch: AMD64
          - name: windows-arm64
            os: windows-11-arm
            platform: windows
            arch: arm64
            ffmpeg_arch: arm64
            cgo_enabled: "0"
            rnnoise_dynamic: "true"
            windows_msystem: CLANGARM64
            windows_msys_package: mingw-w64-clang-aarch64-clang
            windows_cc_subdir: clangarm64
            windows_cc_exe: clang.exe
            nsis_arch: ARM64
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: amd64
            ffmpeg_arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64
            ffmpeg_arch: arm64
          - name: linux-x64
            os: ubuntu-latest
            platform: linux
            arch: amd64
            ffmpeg_arch: x64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            ffmpeg_arch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            file

      - name: Enable Windows RNNoise C toolchain
        if: matrix.platform == 'windows' && matrix.rnnoise_dynamic == 'true'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.windows_msystem }}
          release: true
          update: true
          install: ${{ matrix.windows_msys_package }}
          path-type: inherit

      - name: Export Windows RNNoise compiler
        if: matrix.platform == 'windows' && matrix.rnnoise_dynamic == 'true'
        shell: pwsh
        run: |
          $compiler = Join-Path "${{ steps.msys2.outputs.msys2-location }}" "${{ matrix.windows_cc_subdir }}\bin\${{ matrix.windows_cc_exe }}"
          if (-not (Test-Path -LiteralPath $compiler)) {
            throw "MSYS2 compiler not found: $compiler"
          }
          "CC=$compiler" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          else
            go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Prepare Windows FFmpeg tool
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/ensure-windows-ffmpeg.ps1 -Architecture "${{ matrix.ffmpeg_arch }}" -Force

      - name: Install Windows installer tooling
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Prepare Unix FFmpeg tools
        if: matrix.platform == 'macos' || matrix.platform == 'linux'
        shell: bash
        run: ./scripts/ensure-unix-ffmpeg.sh --platform "${{ matrix.platform }}" --arch "${{ matrix.ffmpeg_arch }}" --force

      - name: Prepare Windows ONNX Runtime
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/ensure-windows-onnxruntime.ps1 -Architecture "${{ matrix.ffmpeg_arch }}" -Force

      - name: Prepare Unix ONNX Runtime
        if: matrix.platform == 'macos' || matrix.platform == 'linux'
        shell: bash
        run: ./scripts/ensure-unix-onnxruntime.sh --platform "${{ matrix.platform }}" --arch "${{ matrix.ffmpeg_arch }}" --force

      - name: Build Windows RNNoise dynamic module
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/build-rnnoise-windows.ps1 -Architecture "${{ matrix.ffmpeg_arch }}" -Compiler "$env:CC" -OutputPath "${{ env.APP_DIR }}\tools\rnnoise.dll"

      - name: Build Unix RNNoise dynamic module
        if: matrix.platform == 'macos' || matrix.platform == 'linux'
        shell: bash
        run: bash ./scripts/build-rnnoise-unix.sh --platform "${{ matrix.platform }}" --arch "${{ matrix.ffmpeg_arch }}" --force

      - name: Test RNNoise dynamic DSP
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          cgo_enabled="1"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cgo_enabled="${{ matrix.cgo_enabled }}"
          fi
          CGO_ENABLED="${cgo_enabled}" go test -tags "${RNNOISE_TAG}" ./internal/audio/rnnoise

      - name: Run platform OCR secret store smoke
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          cgo_enabled="1"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cgo_enabled="${{ matrix.cgo_enabled }}"
          fi
          CGO_ENABLED="${cgo_enabled}" go run ./cmd/ocr-secret-store-smoke -evidence-dir "../release-out/ocr-secret-store-smoke/${{ matrix.name }}"

      - name: Build OCR worker
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          worker_goos="${{ matrix.platform }}"
          if [ "${worker_goos}" = "macos" ]; then
            worker_goos="darwin"
          fi
          ext=""
          if [ "${worker_goos}" = "windows" ]; then
            ext=".exe"
          fi
          worker_dir="tools/ocr-worker/${worker_goos}-${{ matrix.arch }}"
          mkdir -p "${worker_dir}"
          CGO_ENABLED=0 GOOS="${worker_goos}" GOARCH="${{ matrix.arch }}" go build -trimpath -ldflags "-w -s" -o "${worker_dir}/rf-ocr-worker${ext}" "./cmd/ocr-worker"

      - name: Build stable OCR model package for platform smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run ./cmd/ocr-model-package -model ppocrv5-mobile-zh-en -output "../release-out/ocr-worker-platform-smoke/${{ matrix.name }}/models" -force

      - name: Run platform OCR worker stable smoke
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          worker_goos="${{ matrix.platform }}"
          if [ "${worker_goos}" = "macos" ]; then
            worker_goos="darwin"
          fi
          ext=""
          if [ "${worker_goos}" = "windows" ]; then
            ext=".exe"
          fi
          model_zip="$(find "../release-out/ocr-worker-platform-smoke/${{ matrix.name }}/models" -maxdepth 1 -type f -name 'ppocrv5-mobile-zh-en-*.zip' -print -quit)"
          if [ -z "${model_zip}" ]; then
            echo "Stable OCR model package was not produced for platform smoke." >&2
            exit 1
          fi
          go run ./cmd/ocr-worker-platform-smoke \
            -worker-path "tools/ocr-worker/${worker_goos}-${{ matrix.arch }}/rf-ocr-worker${ext}" \
            -runtime-dir "tools/onnxruntime/${worker_goos}-${{ matrix.arch }}" \
            -model-package "${model_zip}" \
            -evidence-dir "../release-out/ocr-worker-platform-smoke/${{ matrix.name }}"
          test -s "../release-out/ocr-worker-platform-smoke/${{ matrix.name }}/ocr-worker-platform-smoke.json"

      - name: Build app
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            tags="${RNNOISE_TAG}"
            CGO_ENABLED="${{ matrix.cgo_enabled }}" wails3 task windows:build ARCH="${{ matrix.arch }}" EXTRA_TAGS="${tags}" CGO_ENABLED="${{ matrix.cgo_enabled }}"
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            CGO_ENABLED=1 wails3 task darwin:package ARCH="${{ matrix.arch }}" EXTRA_TAGS="${RNNOISE_TAG}"
          else
            CGO_ENABLED=1 wails3 task linux:build ARCH="${{ matrix.arch }}" EXTRA_TAGS="gtk3,${RNNOISE_TAG}" CGO_ENABLED=1
          fi

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $root = (Resolve-Path ".").Path
          wails3 generate webview2bootstrapper -dir "$root\${{ env.APP_DIR }}\build\windows\nsis"
          Push-Location "${{ env.APP_DIR }}\build\windows\nsis"
          & makensis `
            -DWAILS_INSTALL_SCOPE=user `
            -DREQUEST_EXECUTION_LEVEL=user `
            "-DARG_RECORDINGFREEDOM_TOOLS_DIR=$root\${{ env.APP_DIR }}\tools" `
            "-DARG_WAILS_${{ matrix.nsis_arch }}_BINARY=$root\${{ env.APP_DIR }}\bin\recordingfreedom.exe" `
            project.nsi
          Pop-Location

      - name: Build desktop smoke tools
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p bin
          tags="${RNNOISE_TAG}"
          cgo_enabled="1"
          ext=""
          if [ "${{ matrix.platform }}" = "linux" ]; then
            tags="gtk3 ${RNNOISE_TAG}"
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            ext=".exe"
            cgo_enabled="${{ matrix.cgo_enabled }}"
          fi
          tag_args=()
          if [ -n "${tags}" ]; then
            tag_args=(-tags "${tags}")
          fi
          CGO_ENABLED="${cgo_enabled}" go build "${tag_args[@]}" -trimpath -ldflags "-w -s" -o "bin/desktop-doctor${ext}" "./cmd/desktop-doctor"
          CGO_ENABLED="${cgo_enabled}" go build "${tag_args[@]}" -trimpath -ldflags "-w -s" -o "bin/video-smoke${ext}" "./cmd/video-smoke"
          CGO_ENABLED="${cgo_enabled}" go build "${tag_args[@]}" -trimpath -ldflags "-w -s" -o "bin/audio-smoke${ext}" "./cmd/audio-smoke"
          CGO_ENABLED="${cgo_enabled}" go build "${tag_args[@]}" -trimpath -ldflags "-w -s" -o "bin/pip-export-smoke${ext}" "./cmd/pip-export-smoke"
          CGO_ENABLED="${cgo_enabled}" go build "${tag_args[@]}" -trimpath -ldflags "-w -s" -o "bin/annotation-export-smoke${ext}" "./cmd/annotation-export-smoke"
          CGO_ENABLED="${cgo_enabled}" go build "${tag_args[@]}" -trimpath -ldflags "-w -s" -o "bin/annotation-overlay-evidence-check${ext}" "./cmd/annotation-overlay-evidence-check"
          CGO_ENABLED="${cgo_enabled}" go build -trimpath -ldflags "-w -s" -o "bin/ocr-desktop-evidence-export${ext}" "./cmd/ocr-desktop-evidence-export"
          CGO_ENABLED="${cgo_enabled}" go build -trimpath -ldflags "-w -s" -o "bin/ocr-desktop-evidence-check${ext}" "./cmd/ocr-desktop-evidence-check"
          CGO_ENABLED="${cgo_enabled}" go build -trimpath -ldflags "-w -s" -o "bin/ocr-desktop-evidence-plan${ext}" "./cmd/ocr-desktop-evidence-plan"
          CGO_ENABLED="${cgo_enabled}" go build -trimpath -ldflags "-w -s" -o "bin/ocr-desktop-evidence-session${ext}" "./cmd/ocr-desktop-evidence-session"
          CGO_ENABLED="${cgo_enabled}" go build -trimpath -ldflags "-w -s" -o "bin/ocr-translation-smoke${ext}" "./cmd/ocr-translation-smoke"
          CGO_ENABLED="${cgo_enabled}" go build -trimpath -ldflags "-w -s" -o "bin/ocr-secret-store-smoke${ext}" "./cmd/ocr-secret-store-smoke"

      - name: Run desktop dependency doctor
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            CGO_ENABLED="${{ matrix.cgo_enabled }}" go run -tags "${RNNOISE_TAG}" ./cmd/desktop-doctor -require-video -require-rnnoise
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            CGO_ENABLED=1 go run -tags "gtk3 ${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise
          else
            CGO_ENABLED=1 go run -tags "${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise
          fi

      - name: Run PIP export pixel smoke
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.platform }}" = "windows" ]; then
            ext=".exe"
          fi
          "./bin/pip-export-smoke${ext}" -synthetic -width 640 -height 360 -duration 1s

      - name: Stage release artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-out
          if [ "${{ matrix.platform }}" = "windows" ]; then
            portable_dir="release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}"
            mkdir -p "${portable_dir}/tools"
            cp "${APP_DIR}/bin/recordingfreedom.exe" "${portable_dir}/recordingfreedom.exe"
            cp "${APP_DIR}/tools/ffmpeg.exe" "${portable_dir}/tools/ffmpeg.exe"
            cp "${APP_DIR}/tools/ffprobe.exe" "${portable_dir}/tools/ffprobe.exe"
            cp "${APP_DIR}/tools/rnnoise.dll" "${portable_dir}/tools/rnnoise.dll"
            cp "${APP_DIR}/tools/THIRD_PARTY_FFMPEG.txt" "${portable_dir}/tools/THIRD_PARTY_FFMPEG.txt"
            cp "${APP_DIR}/tools/THIRD_PARTY_NOTICES.txt" "${portable_dir}/tools/THIRD_PARTY_NOTICES.txt"
            mkdir -p "${portable_dir}/tools/ocr-worker/windows-${{ matrix.arch }}"
            cp "${APP_DIR}/tools/ocr-worker/windows-${{ matrix.arch }}/rf-ocr-worker.exe" "${portable_dir}/tools/ocr-worker/windows-${{ matrix.arch }}/rf-ocr-worker.exe"
            mkdir -p "${portable_dir}/tools/onnxruntime"
            cp -R "${APP_DIR}/tools/onnxruntime/windows-${{ matrix.arch }}" "${portable_dir}/tools/onnxruntime/windows-${{ matrix.arch }}"
            cp "${APP_DIR}/bin/desktop-doctor.exe" "${portable_dir}/tools/desktop-doctor.exe"
            cp "${APP_DIR}/bin/video-smoke.exe" "${portable_dir}/tools/video-smoke.exe"
            cp "${APP_DIR}/bin/audio-smoke.exe" "${portable_dir}/tools/audio-smoke.exe"
            cp "${APP_DIR}/bin/pip-export-smoke.exe" "${portable_dir}/tools/pip-export-smoke.exe"
            cp "${APP_DIR}/bin/annotation-export-smoke.exe" "${portable_dir}/tools/annotation-export-smoke.exe"
            cp "${APP_DIR}/bin/annotation-overlay-evidence-check.exe" "${portable_dir}/tools/annotation-overlay-evidence-check.exe"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-export.exe" "${portable_dir}/tools/ocr-desktop-evidence-export.exe"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-check.exe" "${portable_dir}/tools/ocr-desktop-evidence-check.exe"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-plan.exe" "${portable_dir}/tools/ocr-desktop-evidence-plan.exe"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-session.exe" "${portable_dir}/tools/ocr-desktop-evidence-session.exe"
            cp "${APP_DIR}/bin/ocr-translation-smoke.exe" "${portable_dir}/tools/ocr-translation-smoke.exe"
            cp "${APP_DIR}/bin/ocr-secret-store-smoke.exe" "${portable_dir}/tools/ocr-secret-store-smoke.exe"
            cp "scripts/run-windows-portable-smoke.ps1" "${portable_dir}/tools/run-windows-portable-smoke.ps1"
            powershell -NoProfile -Command "Compress-Archive -Path '${portable_dir}/*' -DestinationPath 'release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-portable.zip' -Force"
            rm -rf "${portable_dir}"
            installer_path="$(find "${APP_DIR}/bin" -maxdepth 1 -iname "*installer.exe" | head -n 1)"
            if [ -z "${installer_path}" ]; then
              echo "No Windows installer was produced under ${APP_DIR}/bin." >&2
              exit 1
            fi
            cp "${installer_path}" "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-setup.exe"
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            app_path="${APP_DIR}/bin/recordingfreedom.app"
            if [ ! -d "${app_path}" ]; then
              echo "No macOS app bundle was produced at ${app_path}." >&2
              exit 1
            fi
            worker_dir="${app_path}/Contents/MacOS/tools/ocr-worker/darwin-${{ matrix.arch }}"
            mkdir -p "${worker_dir}"
            cp "${APP_DIR}/tools/ocr-worker/darwin-${{ matrix.arch }}/rf-ocr-worker" "${worker_dir}/rf-ocr-worker"
            chmod +x "${worker_dir}/rf-ocr-worker"
            stage_dir="release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}"
            mkdir -p "${stage_dir}"
            cp -R "${app_path}" "${stage_dir}/RecordingFreedom.app"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-export" "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-desktop-evidence-export"
            chmod +x "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-desktop-evidence-export"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-check" "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-desktop-evidence-check"
            chmod +x "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-desktop-evidence-check"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-plan" "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-desktop-evidence-plan"
            chmod +x "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-desktop-evidence-plan"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-session" "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-desktop-evidence-session"
            chmod +x "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-desktop-evidence-session"
            cp "${APP_DIR}/bin/ocr-translation-smoke" "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-translation-smoke"
            chmod +x "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-translation-smoke"
            cp "${APP_DIR}/bin/ocr-secret-store-smoke" "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-secret-store-smoke"
            chmod +x "${stage_dir}/RecordingFreedom.app/Contents/MacOS/tools/ocr-secret-store-smoke"
            ditto -c -k --sequesterRsrc --keepParent "${stage_dir}/RecordingFreedom.app" "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-app.zip"
            rm -rf "${stage_dir}"
          else
            portable_dir="release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}"
            mkdir -p "${portable_dir}/tools"
            cp "${APP_DIR}/bin/recordingfreedom" "${portable_dir}/recordingfreedom"
            cp "${APP_DIR}/tools/ffmpeg" "${portable_dir}/tools/ffmpeg"
            cp "${APP_DIR}/tools/ffprobe" "${portable_dir}/tools/ffprobe"
            cp "${APP_DIR}/tools/librnnoise.so" "${portable_dir}/tools/librnnoise.so"
            cp "${APP_DIR}/tools/THIRD_PARTY_FFMPEG.txt" "${portable_dir}/tools/THIRD_PARTY_FFMPEG.txt"
            cp "${APP_DIR}/tools/THIRD_PARTY_NOTICES.txt" "${portable_dir}/tools/THIRD_PARTY_NOTICES.txt"
            mkdir -p "${portable_dir}/tools/ocr-worker/linux-${{ matrix.arch }}"
            cp "${APP_DIR}/tools/ocr-worker/linux-${{ matrix.arch }}/rf-ocr-worker" "${portable_dir}/tools/ocr-worker/linux-${{ matrix.arch }}/rf-ocr-worker"
            mkdir -p "${portable_dir}/tools/onnxruntime"
            cp -R "${APP_DIR}/tools/onnxruntime/linux-${{ matrix.arch }}" "${portable_dir}/tools/onnxruntime/linux-${{ matrix.arch }}"
            cp "${APP_DIR}/bin/desktop-doctor" "${portable_dir}/tools/desktop-doctor"
            cp "${APP_DIR}/bin/video-smoke" "${portable_dir}/tools/video-smoke"
            cp "${APP_DIR}/bin/audio-smoke" "${portable_dir}/tools/audio-smoke"
            cp "${APP_DIR}/bin/pip-export-smoke" "${portable_dir}/tools/pip-export-smoke"
            cp "${APP_DIR}/bin/annotation-export-smoke" "${portable_dir}/tools/annotation-export-smoke"
            cp "${APP_DIR}/bin/annotation-overlay-evidence-check" "${portable_dir}/tools/annotation-overlay-evidence-check"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-export" "${portable_dir}/tools/ocr-desktop-evidence-export"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-check" "${portable_dir}/tools/ocr-desktop-evidence-check"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-plan" "${portable_dir}/tools/ocr-desktop-evidence-plan"
            cp "${APP_DIR}/bin/ocr-desktop-evidence-session" "${portable_dir}/tools/ocr-desktop-evidence-session"
            cp "${APP_DIR}/bin/ocr-translation-smoke" "${portable_dir}/tools/ocr-translation-smoke"
            cp "${APP_DIR}/bin/ocr-secret-store-smoke" "${portable_dir}/tools/ocr-secret-store-smoke"
            if [ -f "${APP_DIR}/build/linux/recordingfreedom.desktop" ]; then
              cp "${APP_DIR}/build/linux/recordingfreedom.desktop" "${portable_dir}/recordingfreedom.desktop"
            else
              cp "${APP_DIR}/build/linux/desktop" "${portable_dir}/recordingfreedom.desktop"
            fi
            chmod +x "${portable_dir}/recordingfreedom" "${portable_dir}/tools/ffmpeg" "${portable_dir}/tools/ffprobe" "${portable_dir}/tools/"* "${portable_dir}/tools/ocr-worker/linux-${{ matrix.arch }}/rf-ocr-worker"
            tar -C release-out -czf "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-portable.tar.gz" "$(basename "${portable_dir}")"
            rm -rf "${portable_dir}"
          fi
          artifact_count="$(find release-out -maxdepth 1 -type f ! -name "SHA256SUMS-*" | wc -l | tr -d ' ')"
          if [ "${artifact_count}" -eq 0 ]; then
            echo "No release artifact was staged." >&2
            exit 1
          fi
          while IFS= read -r artifact; do
            test -s "${artifact}"
          done < <(find release-out -maxdepth 1 -type f ! -name "SHA256SUMS-*")
          (
            cd release-out
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum RecordingFreedom-* > "SHA256SUMS-${{ matrix.name }}.txt"
            else
              shasum -a 256 RecordingFreedom-* > "SHA256SUMS-${{ matrix.name }}.txt"
            fi
          )

      - name: Verify Windows portable artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $modelZip = Get-ChildItem -LiteralPath "release-out/ocr-worker-platform-smoke/${{ matrix.name }}/models" -Filter "ppocrv5-mobile-zh-en-*.zip" | Select-Object -First 1
          if ($null -eq $modelZip) {
            throw "Stable OCR model package was not produced for Windows portable verification."
          }
          ./scripts/verify-windows-portable.ps1 `
            -ZipPath "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-portable.zip" `
            -Architecture "${{ matrix.ffmpeg_arch }}" `
            -OcrModelPackagePath $modelZip.FullName

      - name: Verify Windows installer artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/verify-windows-installer.ps1 -InstallerPath "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-setup.exe" -Architecture "${{ matrix.ffmpeg_arch }}"

      - name: Verify macOS app artifact
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          model_zip="$(find "release-out/ocr-worker-platform-smoke/${{ matrix.name }}/models" -maxdepth 1 -type f -name 'ppocrv5-mobile-zh-en-*.zip' -print -quit)"
          if [ -z "${model_zip}" ]; then
            echo "Stable OCR model package was not produced for macOS app verification." >&2
            exit 1
          fi
          ./scripts/verify-macos-app-zip.sh "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-app.zip" "${{ matrix.ffmpeg_arch }}" "${model_zip}"

      - name: Verify Linux portable artifact
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          model_zip="$(find "release-out/ocr-worker-platform-smoke/${{ matrix.name }}/models" -maxdepth 1 -type f -name 'ppocrv5-mobile-zh-en-*.zip' -print -quit)"
          if [ -z "${model_zip}" ]; then
            echo "Stable OCR model package was not produced for Linux portable verification." >&2
            exit 1
          fi
          ./scripts/verify-linux-portable.sh "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-portable.tar.gz" "${{ matrix.ffmpeg_arch }}" "${model_zip}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: RecordingFreedom-${{ matrix.name }}
          path: release-out/**
          if-no-files-found: error

  model-package:
    name: Build OCR Model Package
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - name: Build OCR model packages
        working-directory: ${{ env.APP_DIR }}
        run: >
          go run ./cmd/ocr-model-package
          -model all
          -output ../release-out/ocr-models
          -catalog-output ../release-out/ocr-models/ocr-model-catalog.json
          -release-base-url "https://github.com/lemon-casino/RecordingFreedom/releases/download/${{ github.ref_name }}"
          -force

      - name: Prepare Linux ONNX Runtime for OCR model smoke
        run: ./scripts/ensure-unix-onnxruntime.sh --platform linux --arch x64 --force

      - name: Build OCR worker for model smoke
        run: |
          mkdir -p "${APP_DIR}/bin"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-w -s" -o "${APP_DIR}/bin/rf-ocr-worker-smoke" "./${APP_DIR}/cmd/ocr-worker"

      - name: Run stable OCR model package smoke
        shell: bash
        run: |
          set -euo pipefail
          model_zip="$(find release-out/ocr-models -maxdepth 1 -type f -name 'ppocrv5-mobile-zh-en-*.zip' -print -quit)"
          if [ -z "${model_zip}" ]; then
            echo "Stable OCR model package was not produced." >&2
            exit 1
          fi
          rm -rf release-out/ocr-model-smoke
          mkdir -p release-out/ocr-model-smoke
          unzip -q "${model_zip}" -d release-out/ocr-model-smoke
          "${APP_DIR}/bin/rf-ocr-worker-smoke" \
            --smoke \
            --runtime-dir "${APP_DIR}/tools/onnxruntime/linux-amd64" \
            --model-dir "release-out/ocr-model-smoke/ppocrv5-mobile-zh-en" \
            --must-contain RecordingFreedom \
            --must-contain 文字识别

      - name: Verify stable OCR model package artifact
        shell: bash
        run: |
          set -euo pipefail
          model_zip="$(find release-out/ocr-models -maxdepth 1 -type f -name 'ppocrv5-mobile-zh-en-*.zip' -print -quit)"
          if [ -z "${model_zip}" ]; then
            echo "Stable OCR model package was not produced." >&2
            exit 1
          fi
          test -s "${model_zip}"
          unzip -l "${model_zip}" | grep -q "ppocrv5-mobile-zh-en/manifest.json"
          unzip -l "${model_zip}" | grep -q "ppocrv5-mobile-zh-en/det.onnx"
          unzip -l "${model_zip}" | grep -q "ppocrv5-mobile-zh-en/cls.onnx"
          unzip -l "${model_zip}" | grep -q "ppocrv5-mobile-zh-en/rec.onnx"
          unzip -l "${model_zip}" | grep -q "ppocrv5-mobile-zh-en/keys.txt"
          unzip -l "${model_zip}" | grep -q "ppocrv5-mobile-zh-en/smoke.png"
          unzip -l "${model_zip}" | grep -q "ppocrv5-mobile-zh-en/smoke.expected.json"
          test -s release-out/ocr-models/ocr-model-catalog.json
          grep -q "ppocrv5-mobile-zh-en" release-out/ocr-models/ocr-model-catalog.json
          grep -q "$(basename "${model_zip}")" release-out/ocr-models/ocr-model-catalog.json
          grep -q '"sha256"' release-out/ocr-models/ocr-model-catalog.json
          (
            cd "$(dirname "${model_zip}")"
            sha256sum "$(basename "${model_zip}")" > SHA256SUMS-ocr-models.txt
          )

      - name: Upload OCR model package artifact
        uses: actions/upload-artifact@v5
        with:
          name: RecordingFreedom-ocr-models
          path: release-out/ocr-models/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, model-package]
    steps:
      - uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-artifacts -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release artifacts were produced." >&2
            exit 1
          fi

          title="RecordingFreedom ${TAG_NAME}"
          cat > release-notes.md <<'NOTES'
          RecordingFreedom desktop release.

          Ready to verify:
          - Capsule recorder UI shell and tray/settings windows.
          - Simplified Chinese / English global language switching.
          - Settings persistence, app-managed data/video storage, storage health, preflight, recovery scan, and capability matrix.
          - Explicit mock .rfrec package flow for UI/package validation.
          - No-GUI smoke for settings, storage, preflight, mock start/pause/resume/stop, ready manifest, RNNoise/camera/PIP manifest contract, and recovery scan.
          - Developer audio smoke for Windows WASAPI microphone and system-loopback capture.
          - Windows FFmpeg desktop video writer contract for screen/all-screen/region/locked-window capture; enabled WASAPI system audio and microphone tracks are muxed into the final screen.mp4 at stop, and the Windows release artifacts are staged as a portable zip plus an NSIS setup installer. Both include tools/ffmpeg.exe and tools/ffprobe.exe; the portable zip also includes desktop-doctor/video-smoke/audio-smoke/pip-export-smoke/annotation-export-smoke/annotation-overlay-evidence-check/ocr-desktop-evidence-export/ocr-desktop-evidence-check/ocr-desktop-evidence-plan/ocr-desktop-evidence-session/ocr-translation-smoke/ocr-secret-store-smoke diagnostics.
          - Windows clean-machine portable smoke entrypoint at tools/run-windows-portable-smoke.ps1.
          - RNNoise native DSP is built from source as a dynamic module for every desktop artifact: Windows packages include tools/rnnoise.dll, macOS app bundles include Contents/MacOS/tools/librnnoise.dylib, and Linux portable archives include tools/librnnoise.so. The Go/Wails app uses the rnnoise_dynamic build tag and loads the module at runtime; desktop-doctor -require-rnnoise and the RNNoise dynamic DSP smoke are release gates for all desktop architectures, including Windows ARM64.
          - Full desktop build matrix is enabled for Windows x64/arm64, macOS x64/arm64, and Linux x64/arm64. Release artifacts are Windows portable zip + Windows setup.exe, macOS RecordingFreedom.app zip, and Linux portable tar.gz for each architecture.
          - macOS app bundles include Contents/MacOS/recordingfreedom, Contents/MacOS/tools/ffmpeg, Contents/MacOS/tools/ffprobe, Contents/MacOS/tools/librnnoise.dylib, Contents/MacOS/tools/ocr-desktop-evidence-export, Contents/MacOS/tools/ocr-desktop-evidence-check, Contents/MacOS/tools/ocr-desktop-evidence-plan, Contents/MacOS/tools/ocr-desktop-evidence-session, Contents/MacOS/tools/ocr-translation-smoke, Contents/MacOS/tools/ocr-secret-store-smoke, icons, Info.plist permissions, and third-party notices.
          - Linux portable archives include recordingfreedom, tools/ffmpeg, tools/ffprobe, tools/librnnoise.so, diagnostic smoke tools including pip-export-smoke, ocr-desktop-evidence-export, ocr-desktop-evidence-check, ocr-desktop-evidence-plan, ocr-desktop-evidence-session, ocr-translation-smoke and ocr-secret-store-smoke, a desktop file, and third-party notices.
          - OCR protocol worker is built for every desktop architecture and staged under tools/ocr-worker/<os-arch>/rf-ocr-worker(.exe). ONNX Runtime v1.23.2 CPU runtime is bundled under tools/onnxruntime/<os-arch>/ and verified through worker --capabilities --runtime-dir. A separate RecordingFreedom-ocr-models release artifact now contains the verified ppocrv5-mobile-zh-en stable model package and ocr-model-catalog.json for explicit in-app catalog refresh/download. Native ONNX OCR inference, stable model smoke, and release-catalog package metadata are release-gated; PP-OCRv6 latest/quality packages and real desktop catalog refresh/download evidence remain queued behind the OCR plan.
          - Whiteboard / Excalidraw board and recording annotation: the main capsule keeps a Whiteboard entry before recording, during compact video recording, while paused, and during audio-only recording. Before recording and during audio-only recording it opens the normal whiteboard; during video recording or pause it opens the annotation overlay.
          - Whiteboard scene persistence and export: normal boards save under app data, restore the latest scene, and export PNG/SVG/.excalidraw through the desktop backend.
          - Recording annotation package flow: annotation scenes, element events, overlay diagnostics, timeline snapshots, reconstructed element PNGs, and manifest metadata are written into the current .rfrec package for later recovery/export.
          - Recording-time whiteboard region flow: opening the whiteboard during video recording requires a selected annotation region, keeps that region in the package manifest, and exports the annotation overlay at the selected offset instead of falling back to the full screen.
          - Recording-time whiteboard controls: annotation overlay includes an undo action and a reselect-region action that clears the previous annotation scene/artifacts before drawing on a newly selected board area.
          - Recording-time whiteboard edge visibility: the annotation overlay window expands beyond the selected board area and draws a non-interactive highlighted frame around the true canvas, so the board edge remains visible without being baked into exported annotation PNGs.
          - Recording-time and screenshot annotation save status: the shared annotation overlay now tracks the last successfully saved scene, shows Saving while writing, keeps Saved after the scene is written into the recording package or screenshot history, and no longer flips back to Unsaved when Excalidraw emits an unchanged follow-up scene update.
          - Desktop whiteboard launch guard: Wails windows are detected by the wails.localhost host as well as the user agent, preventing recording-time annotation errors from opening an external browser tab pointed at wails.localhost.
          - Screenshot and pinboard workflow: idle capsule Screenshot / Whiteboard menu, selectable screenshot region, full screenshot, window screenshot, focused-window screenshot, scrolling screenshot, screenshot history, open/annotate/pin/fixed actions, real-image pinned window state, screenshot-backed Excalidraw image import, live screenshot-to-whiteboard event delivery, and configurable screenshot shortcut. Scrolling screenshot uses the native selection flow and saves a normal region screenshot instead of a fake long image when the selected target does not scroll.
          - Smart screenshot and region assist: the app now carries screen/window/edge candidates through region screenshot, scrolling screenshot, recording annotation board, and custom recording region selection; user drag selections can snap to nearby strong visual element edges. The implementation is based on a cloned mg-chao/snow-shot analysis, with the UI Automation/Accessibility child-element provider queued behind the shared RegionSmartCandidate contract.
          - Screenshot history maintenance: history items can be opened in their containing folder or deleted from the managed screenshot store, and region screenshot now matches recording region selection by entering an editable move/resize/cancel/save frame before writing the screenshot.
          - Screenshot history state separation: stale pinned flags in older history files are normalized away, fixed-state is preserved, and current pin visibility is kept in a separate pin-window state so the history list does not start as already pinned.
          - Whiteboard save history: manual normal whiteboard save now writes the Excalidraw scene and a PNG snapshot into screenshot history with mode=whiteboard, while recording annotation saves continue to write into the active .rfrec annotation package and screenshot annotation saves continue to write annotated screenshots into screenshot history.
          - Capsule docking stability: edge snap publishes the dock side before native window resize/move, clears stale collapsed positions, suppresses programmatic move feedback, keeps buttons/popovers/settings as no-drag regions, and only snaps to external monitor edges so side docking and dropdown/list opening do not cause the capsule to flash or snap at multi-monitor seams.
          - Camera sidecar, PIP, and annotation export contract: structured camera.pip settings/manifest/export plan, transparent draggable/resizable PIP overlay, WebView camera preview best-effort device matching, Windows DirectShow / macOS AVFoundation / Linux v4l2 FFmpeg sidecar writer paths, Wails ExportRecordingPackage(), cmd/pip-export-smoke, cmd/annotation-export-smoke, cmd/annotation-overlay-evidence-check, FFmpeg PIP export verification that samples the final MP4 PIP pixels, and FFmpeg annotation export verification that samples pixels from the final MP4.

          Not included yet:
          - End-to-end verified native recording on every desktop platform. macOS ScreenCaptureKit display/window/single-display region capture is wired in code but still needs real-device smoke validation; Windows portable artifacts include the clean-machine smoke runner but still need the downloaded artifact to be executed on a target desktop; PipeWire media writer is not complete.
          - Cross-platform long-recording audio sync validation. Windows local smoke has passed 1 minute, 5 minute, and 20 minute recording with stop-time mux into screen.mp4; macOS system audio is wired through ScreenCaptureKit mux and still needs real-device smoke; Linux audio capture is queued.
          - Cross-platform real-camera acceptance. The sidecar/PIP code path is implemented, but real device smoke is still required for preview matching, Windows/macOS/Linux camera sidecar recording, screen + camera + audio combinations, pause/resume timing, and long-recording sync.
          - Completed cross-platform annotation overlay acceptance. This release includes the overlay entry, hit-region contracts, package writing, export planning, and FFmpeg annotation export smoke, but real Windows/macOS/Linux evidence is still required for transparent click-through, multi-monitor/high-DPI geometry, real hand-drawn annotation packages, and exported MP4 review.
          - Signed Windows installers, macOS notarization, or Linux deb/rpm/AppImage packages.
          NOTES

          release_flags=(--title "${title}" --notes-file release-notes.md)
          if [[ "${TAG_NAME}" == *preview* || "${TAG_NAME}" == *alpha* || "${TAG_NAME}" == *beta* || "${TAG_NAME}" == *rc* ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" "${release_flags[@]}"
          else
            gh release create "${TAG_NAME}" "${release_flags[@]}"
          fi

          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber

      - name: Verify published release downloads
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/verify-release-artifacts.ps1 \
            -Repository "${GITHUB_REPOSITORY}" \
            -TagName "${TAG_NAME}" \
            -Targets all \
            -Architectures x64,arm64 \
            -DownloadDir release-download-verification

      - name: Upload release download verification evidence
        uses: actions/upload-artifact@v5
        with:
          name: RecordingFreedom-release-download-verification
          path: release-download-verification/release-artifact-verification.json
          if-no-files-found: error
