name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25.0"
  NODE_VERSION: "24"
  WAILS_VERSION: "v3.0.0-alpha2.109"
  APP_DIR: app
  RNNOISE_TAG: rnnoise_native

jobs:
  validate:
    name: Release Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        run: |
          go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npx playwright install --with-deps chromium

      - name: Generate Wails bindings
        working-directory: ${{ env.APP_DIR }}
        run: wails3 generate bindings -ts -i -f "-tags gtk3"

      - name: Verify generated bindings are committed
        working-directory: ${{ env.APP_DIR }}
        run: git diff --exit-code -- frontend/bindings

      - name: Build frontend
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run build

      - name: Run frontend e2e
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run test:e2e

      - name: Clean frontend e2e artifacts before Go tests
        working-directory: ${{ env.APP_DIR }}
        run: rm -rf frontend/test-results frontend/playwright-report

      - name: Test Go packages
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          set -o pipefail
          set +e
          go test -tags gtk3 ./... 2>&1 | tee go-test.log
          status="${PIPESTATUS[0]}"
          set -e
          if [ "${status}" -ne 0 ]; then
            {
              echo "### Go test failure"
              echo '```text'
              tail -200 go-test.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            message="$(tail -50 go-test.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
            echo "::error title=Go test failed::${message}"
            exit "${status}"
          fi

      - name: Test RNNoise native DSP
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go test -tags rnnoise_native ./internal/audio/rnnoise/native ./internal/recording

      - name: Run preview smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run -tags gtk3 ./cmd/preview-smoke

      - name: Verify release workflow gates
        working-directory: ${{ env.APP_DIR }}
        run: go run ./cmd/release-config-check

      - name: Run desktop dependency doctor
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go run -tags "gtk3 ${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Enable Windows cgo toolchain
        shell: pwsh
        run: |
          if (!(Test-Path "C:\msys64\usr\bin\bash.exe")) {
            throw "MSYS2 is required for the Windows RNNoise cgo build but was not found at C:\msys64"
          }
          & "C:\msys64\usr\bin\bash.exe" -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gcc"
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Prepare Windows FFmpeg tool
        shell: pwsh
        run: ./scripts/ensure-windows-ffmpeg.ps1

      - name: Install Windows installer tooling
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build app
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: CGO_ENABLED=1 wails3 task windows:build EXTRA_TAGS="${RNNOISE_TAG}" CGO_ENABLED=1

      - name: Build Windows installer
        shell: pwsh
        run: |
          $root = (Resolve-Path ".").Path
          wails3 generate webview2bootstrapper -dir "$root\${{ env.APP_DIR }}\build\windows\nsis"
          Push-Location "${{ env.APP_DIR }}\build\windows\nsis"
          & makensis `
            -DWAILS_INSTALL_SCOPE=user `
            -DREQUEST_EXECUTION_LEVEL=user `
            "-DARG_RECORDINGFREEDOM_TOOLS_DIR=$root\${{ env.APP_DIR }}\tools" `
            "-DARG_WAILS_AMD64_BINARY=$root\${{ env.APP_DIR }}\bin\recordingfreedom.exe" `
            project.nsi
          Pop-Location

      - name: Build Windows portable smoke tools
        working-directory: ${{ env.APP_DIR }}
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          New-Item -ItemType Directory -Force -Path "bin" | Out-Null
          go build -tags "$env:RNNOISE_TAG" -trimpath -ldflags "-w -s" -o "bin\desktop-doctor.exe" ".\cmd\desktop-doctor"
          go build -tags "$env:RNNOISE_TAG" -trimpath -ldflags "-w -s" -o "bin\video-smoke.exe" ".\cmd\video-smoke"
          go build -tags "$env:RNNOISE_TAG" -trimpath -ldflags "-w -s" -o "bin\audio-smoke.exe" ".\cmd\audio-smoke"
          go build -tags "$env:RNNOISE_TAG" -trimpath -ldflags "-w -s" -o "bin\annotation-export-smoke.exe" ".\cmd\annotation-export-smoke"
          go build -tags "$env:RNNOISE_TAG" -trimpath -ldflags "-w -s" -o "bin\annotation-overlay-evidence-check.exe" ".\cmd\annotation-overlay-evidence-check"

      - name: Run desktop dependency doctor
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: CGO_ENABLED=1 go run -tags "${RNNOISE_TAG}" ./cmd/desktop-doctor -require-video -require-rnnoise

      - name: Stage release artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-out
          portable_dir="release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}"
          mkdir -p "${portable_dir}/tools"
          cp "${APP_DIR}/bin/recordingfreedom.exe" "${portable_dir}/recordingfreedom.exe"
          cp "${APP_DIR}/tools/ffmpeg.exe" "${portable_dir}/tools/ffmpeg.exe"
          if [ -f "${APP_DIR}/tools/ffprobe.exe" ]; then
            cp "${APP_DIR}/tools/ffprobe.exe" "${portable_dir}/tools/ffprobe.exe"
          fi
          cp "${APP_DIR}/tools/THIRD_PARTY_FFMPEG.txt" "${portable_dir}/tools/THIRD_PARTY_FFMPEG.txt"
          cp "${APP_DIR}/tools/THIRD_PARTY_NOTICES.txt" "${portable_dir}/tools/THIRD_PARTY_NOTICES.txt"
          cp "${APP_DIR}/bin/desktop-doctor.exe" "${portable_dir}/tools/desktop-doctor.exe"
          cp "${APP_DIR}/bin/video-smoke.exe" "${portable_dir}/tools/video-smoke.exe"
          cp "${APP_DIR}/bin/audio-smoke.exe" "${portable_dir}/tools/audio-smoke.exe"
          cp "${APP_DIR}/bin/annotation-export-smoke.exe" "${portable_dir}/tools/annotation-export-smoke.exe"
          cp "${APP_DIR}/bin/annotation-overlay-evidence-check.exe" "${portable_dir}/tools/annotation-overlay-evidence-check.exe"
          cp "scripts/run-windows-portable-smoke.ps1" "${portable_dir}/tools/run-windows-portable-smoke.ps1"
          powershell -NoProfile -Command "Compress-Archive -Path '${portable_dir}/*' -DestinationPath 'release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-portable.zip' -Force"
          rm -rf "${portable_dir}"
          installer_path="$(find "${APP_DIR}/bin" -maxdepth 1 -iname "*installer.exe" | head -n 1)"
          if [ -z "${installer_path}" ]; then
            echo "No Windows installer was produced under ${APP_DIR}/bin." >&2
            exit 1
          fi
          cp "${installer_path}" "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-setup.exe"
          artifact_count="$(find release-out -maxdepth 1 -type f ! -name "SHA256SUMS-*" | wc -l | tr -d ' ')"
          if [ "${artifact_count}" -eq 0 ]; then
            echo "No release artifact was staged." >&2
            exit 1
          fi
          while IFS= read -r artifact; do
            test -s "${artifact}"
          done < <(find release-out -maxdepth 1 -type f ! -name "SHA256SUMS-*")
          (
            cd release-out
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum RecordingFreedom-* > "SHA256SUMS-${{ matrix.name }}.txt"
            else
              shasum -a 256 RecordingFreedom-* > "SHA256SUMS-${{ matrix.name }}.txt"
            fi
          )

      - name: Verify Windows portable artifact
        shell: pwsh
        run: ./scripts/verify-windows-portable.ps1 -ZipPath "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-portable.zip"

      - name: Verify Windows installer artifact
        shell: pwsh
        run: ./scripts/verify-windows-installer.ps1 -InstallerPath "release-out/RecordingFreedom-${{ matrix.name }}-${{ github.ref_name }}-setup.exe"

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: RecordingFreedom-${{ matrix.name }}
          path: release-out/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-artifacts -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release artifacts were produced." >&2
            exit 1
          fi

          title="RecordingFreedom ${TAG_NAME}"
          cat > release-notes.md <<'NOTES'
          RecordingFreedom Wails v3 preview build.

          Ready to verify:
          - Capsule recorder UI shell and tray/settings windows.
          - Simplified Chinese / English global language switching.
          - Settings persistence, app-managed data/video storage, storage health, preflight, recovery scan, and capability matrix.
          - Explicit mock .rfrec package flow for UI/package validation.
          - No-GUI preview smoke for settings, storage, preflight, mock start/pause/resume/stop, ready manifest, RNNoise/camera/PIP manifest contract, and recovery scan.
          - Developer audio smoke for Windows WASAPI microphone and system-loopback capture.
          - Windows FFmpeg desktop video writer contract for screen/all-screen/region/locked-window capture; enabled WASAPI system audio and microphone tracks are muxed into the final screen.mp4 at stop, and the Windows preview artifacts are staged as a portable zip plus an NSIS setup installer. Both include tools/ffmpeg.exe and tools/ffprobe.exe; the portable zip also includes desktop-doctor/video-smoke/audio-smoke/annotation-export-smoke/annotation-overlay-evidence-check diagnostics.
          - Windows clean-machine portable smoke entrypoint at tools/run-windows-portable-smoke.ps1.
          - RNNoise native DSP is compiled into release artifacts with the rnnoise_native cgo build tag; desktop-doctor -require-rnnoise is a release build gate.
          - Whiteboard / Excalidraw preview: the main capsule keeps a Whiteboard entry before recording, during compact video recording, while paused, and during audio-only recording. Before recording and during audio-only recording it opens the normal whiteboard; during video recording or pause it opens the annotation overlay.
          - Whiteboard scene persistence and export: normal boards save under app data, restore the latest scene, and export PNG/SVG/.excalidraw through the desktop backend.
          - Recording annotation package flow: annotation scenes, element events, overlay diagnostics, timeline snapshots, reconstructed element PNGs, and manifest metadata are written into the current .rfrec package for later recovery/export.
          - Recording-time whiteboard region flow: opening the whiteboard during video recording requires a selected annotation region, keeps that region in the package manifest, and exports the annotation overlay at the selected offset instead of falling back to the full screen.
          - Recording-time whiteboard controls: annotation overlay includes an undo action and a reselect-region action that clears the previous annotation scene/artifacts before drawing on a newly selected board area.
          - Recording-time whiteboard edge visibility: the annotation overlay window expands beyond the selected board area and draws a non-interactive highlighted frame around the true canvas, so the board edge remains visible without being baked into exported annotation PNGs.
          - Desktop whiteboard launch guard: Wails windows are detected by the wails.localhost host as well as the user agent, preventing recording-time annotation errors from opening an external browser tab pointed at wails.localhost.
          - Camera sidecar, PIP, and annotation export contract: structured camera.pip settings/manifest/export plan, transparent draggable/resizable PIP overlay, WebView camera preview best-effort device matching, Windows DirectShow / macOS AVFoundation / Linux v4l2 FFmpeg sidecar writer paths, Wails ExportRecordingPackage(), cmd/pip-export-smoke, cmd/annotation-export-smoke, cmd/annotation-overlay-evidence-check, FFmpeg PIP export verification, and FFmpeg annotation export verification that samples pixels from the final MP4.
          - Windows Wails portable and setup installer artifacts. macOS and Linux artifact production is temporarily disabled in GitHub Actions until their complete app bundles and smoke/release gates are ready to run again.

          Not included yet:
          - End-to-end verified native recording on every desktop platform. macOS ScreenCaptureKit display/window/single-display region capture is wired in code but still needs real-device smoke validation; Windows portable artifacts include the clean-machine smoke runner but still need the downloaded artifact to be executed on a target desktop; PipeWire media writer is not complete.
          - Cross-platform long-recording audio sync validation. Windows local smoke has passed 1 minute, 5 minute, and 20 minute recording with stop-time mux into screen.mp4; macOS system audio is wired through ScreenCaptureKit mux and still needs real-device smoke before macOS artifacts are re-enabled; Linux audio capture is queued before Linux artifacts are re-enabled.
          - Cross-platform real-camera acceptance. The sidecar/PIP code path is implemented, but real device smoke is still required for preview matching, Windows/macOS/Linux camera sidecar recording, screen + camera + audio combinations, pause/resume timing, and long-recording sync.
          - Completed cross-platform annotation overlay acceptance. The preview includes the overlay entry, hit-region contracts, package writing, export planning, and FFmpeg annotation export smoke, but real Windows/macOS/Linux evidence is still required for transparent click-through, multi-monitor/high-DPI geometry, real hand-drawn annotation packages, and exported MP4 review.
          - Signed Windows installers, macOS notarization, or Linux packages.
          NOTES

          release_flags=(--title "${title}" --notes-file release-notes.md)
          if [[ "${TAG_NAME}" == *preview* || "${TAG_NAME}" == *alpha* || "${TAG_NAME}" == *beta* || "${TAG_NAME}" == *rc* ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" "${release_flags[@]}"
          else
            gh release create "${TAG_NAME}" "${release_flags[@]}"
          fi

          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
