name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.0"
  NODE_VERSION: "24"
  WAILS_VERSION: "v3.0.0-alpha2.109"
  APP_DIR: app
  RNNOISE_TAG: rnnoise_native

jobs:
  validate:
    name: Bindings, Frontend, Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        run: |
          go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Generate Wails bindings
        working-directory: ${{ env.APP_DIR }}
        run: wails3 generate bindings -ts -i -f "-tags gtk3"

      - name: Verify generated bindings are committed
        working-directory: ${{ env.APP_DIR }}
        run: git diff --exit-code -- frontend/bindings

      - name: Build frontend
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run build

      - name: Test Go packages
        working-directory: ${{ env.APP_DIR }}
        run: go test -tags gtk3 ./...

      - name: Test RNNoise native DSP
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go test -tags rnnoise_native ./internal/audio/rnnoise/native ./internal/recording

      - name: Run preview smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run -tags gtk3 ./cmd/preview-smoke

      - name: Verify release workflow gates
        working-directory: ${{ env.APP_DIR }}
        run: go run ./cmd/release-config-check

      - name: Run desktop dependency doctor
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go run -tags "gtk3 ${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise

  macos-native-contract:
    name: macOS Native Capture Contracts
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - name: Test native macOS capture contracts
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go test ./internal/capture ./internal/devices ./internal/video ./internal/recording

  wails-build:
    name: Wails Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Enable Windows cgo toolchain
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "C:\msys64\usr\bin\bash.exe")) {
            throw "MSYS2 is required for the Windows RNNoise cgo build but was not found at C:\msys64"
          }
          & "C:\msys64\usr\bin\bash.exe" -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gcc"
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          else
            go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Prepare Windows FFmpeg tool
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/ensure-windows-ffmpeg.ps1

      - name: Build app
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            CGO_ENABLED=1 wails3 build -tags "gtk3,${RNNOISE_TAG}"
          else
            CGO_ENABLED=1 wails3 build -tags "${RNNOISE_TAG}"
          fi

      - name: Run desktop dependency doctor
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            CGO_ENABLED=1 go run -tags "${RNNOISE_TAG}" ./cmd/desktop-doctor -require-video -require-rnnoise
          elif [ "${{ runner.os }}" = "Linux" ]; then
            CGO_ENABLED=1 go run -tags "gtk3 ${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise
          else
            CGO_ENABLED=1 go run -tags "${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: recordingfreedom-${{ runner.os }}-${{ runner.arch }}
          path: ${{ env.APP_DIR }}/bin/**
          if-no-files-found: error
