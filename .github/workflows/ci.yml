name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.0"
  NODE_VERSION: "24"
  WAILS_VERSION: "v3.0.0-alpha2.109"
  APP_DIR: app

jobs:
  validate:
    name: Bindings, Frontend, Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        run: |
          go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Generate Wails bindings
        working-directory: ${{ env.APP_DIR }}
        run: wails3 generate bindings -ts -i -f "-tags gtk3"

      - name: Verify generated bindings are committed
        working-directory: ${{ env.APP_DIR }}
        run: git diff --exit-code -- frontend/bindings

      - name: Build frontend
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run build

      - name: Test Go packages
        working-directory: ${{ env.APP_DIR }}
        run: go test -tags gtk3 ./...

      - name: Test RNNoise native DSP
        id: rnnoise-native-test
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          set -o pipefail
          {
            go env CGO_ENABLED GOOS GOARCH CC CXX
            go test -x -v -tags rnnoise_native ./internal/audio/rnnoise/native
          } 2>&1 | tee rnnoise-native-test.log

      - name: Upload RNNoise native diagnostics
        if: failure() && steps.rnnoise-native-test.conclusion == 'failure'
        uses: actions/upload-artifact@v5
        with:
          name: rnnoise-native-test-log
          path: ${{ env.APP_DIR }}/rnnoise-native-test.log
          if-no-files-found: error

      - name: Run preview smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run -tags gtk3 ./cmd/preview-smoke

  macos-native-contract:
    name: macOS Native Capture Contracts
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - name: Test CoreGraphics and capability contracts
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go test ./internal/capture ./internal/devices

  wails-build:
    name: Wails Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          else
            go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Build app
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            wails3 build -tags gtk3
          else
            wails3 build
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: recordingfreedom-${{ runner.os }}-${{ runner.arch }}
          path: ${{ env.APP_DIR }}/bin/**
          if-no-files-found: error
