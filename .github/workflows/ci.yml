name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.0"
  NODE_VERSION: "24"
  WAILS_VERSION: "v3.0.0-alpha2.109"
  APP_DIR: app
  RNNOISE_TAG: rnnoise_native

jobs:
  validate:
    name: Bindings, Frontend, Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        run: |
          go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npx playwright install --with-deps chromium

      - name: Generate Wails bindings
        working-directory: ${{ env.APP_DIR }}
        run: wails3 generate bindings -ts -i -f "-tags gtk3"

      - name: Verify generated bindings are committed
        working-directory: ${{ env.APP_DIR }}
        run: git diff --exit-code -- frontend/bindings

      - name: Build frontend
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run build

      - name: Run frontend e2e
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run test:e2e

      - name: Clean frontend e2e artifacts before Go tests
        working-directory: ${{ env.APP_DIR }}
        run: rm -rf frontend/test-results frontend/playwright-report

      - name: Test Go packages
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          set -o pipefail
          set +e
          go test -tags gtk3 ./... 2>&1 | tee go-test.log
          status="${PIPESTATUS[0]}"
          set -e
          if [ "${status}" -ne 0 ]; then
            {
              echo "### Go test failure"
              echo '```text'
              tail -200 go-test.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            message="$(tail -50 go-test.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
            echo "::error title=Go test failed::${message}"
            exit "${status}"
          fi

      - name: Test RNNoise native DSP
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go test -tags rnnoise_native ./internal/audio/rnnoise/native ./internal/recording

      - name: Run preview smoke
        working-directory: ${{ env.APP_DIR }}
        run: go run -tags gtk3 ./cmd/preview-smoke

      - name: Verify release workflow gates
        working-directory: ${{ env.APP_DIR }}
        run: go run ./cmd/release-config-check

      - name: Run desktop dependency doctor
        working-directory: ${{ env.APP_DIR }}
        env:
          CGO_ENABLED: "1"
        run: go run -tags "gtk3 ${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise

  desktop-build:
    name: Desktop Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            platform: windows
            arch: amd64
            ffmpeg_arch: x64
            windows_msystem: MINGW64
            windows_msys_package: mingw-w64-x86_64-gcc
            windows_cc: gcc
            windows_cgo_cflags: ""
            windows_cgo_ldflags: ""
          - name: windows-arm64
            os: windows-11-arm
            platform: windows
            arch: arm64
            ffmpeg_arch: arm64
            windows_msystem: CLANGARM64
            windows_msys_package: mingw-w64-clang-aarch64-clang
            windows_cc: clang
            windows_cgo_cflags: --target=aarch64-w64-mingw32 -Wno-dll-attribute-on-redeclaration
            windows_cgo_ldflags: --target=aarch64-w64-mingw32 -fuse-ld=lld
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: amd64
            ffmpeg_arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64
            ffmpeg_arch: arm64
          - name: linux-x64
            os: ubuntu-latest
            platform: linux
            arch: amd64
            ffmpeg_arch: x64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            ffmpeg_arch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install Linux Wails build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            file

      - name: Enable Windows cgo toolchain
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.windows_msystem }}
          release: true
          update: true
          install: ${{ matrix.windows_msys_package }}
          path-type: inherit

      - name: Export Windows cgo compiler
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          "CC=${{ matrix.windows_cc }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          if ("${{ matrix.windows_cgo_cflags }}" -ne "") {
            "CGO_CFLAGS=${{ matrix.windows_cgo_cflags }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          if ("${{ matrix.windows_cgo_ldflags }}" -ne "") {
            "CGO_LDFLAGS=${{ matrix.windows_cgo_ldflags }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Install Wails v3 CLI
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            go install -tags gtk3 github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          else
            go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm ci

      - name: Prepare Windows FFmpeg tool
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/ensure-windows-ffmpeg.ps1 -Architecture "${{ matrix.ffmpeg_arch }}" -Force

      - name: Prepare Unix FFmpeg tools
        if: matrix.platform == 'macos' || matrix.platform == 'linux'
        shell: bash
        run: ./scripts/ensure-unix-ffmpeg.sh --platform "${{ matrix.platform }}" --arch "${{ matrix.ffmpeg_arch }}" --force

      - name: Build app
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            CGO_ENABLED=1 wails3 task windows:build ARCH="${{ matrix.arch }}" EXTRA_TAGS="${RNNOISE_TAG}" CGO_ENABLED=1
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            CGO_ENABLED=1 wails3 task darwin:package ARCH="${{ matrix.arch }}" EXTRA_TAGS="${RNNOISE_TAG}"
          else
            CGO_ENABLED=1 wails3 task linux:build ARCH="${{ matrix.arch }}" EXTRA_TAGS="gtk3,${RNNOISE_TAG}" CGO_ENABLED=1
          fi

      - name: Build desktop smoke tools
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p bin
          tags="${RNNOISE_TAG}"
          ext=""
          if [ "${{ matrix.platform }}" = "linux" ]; then
            tags="gtk3 ${RNNOISE_TAG}"
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            ext=".exe"
          fi
          go build -tags "${tags}" -trimpath -ldflags "-w -s" -o "bin/desktop-doctor${ext}" "./cmd/desktop-doctor"
          go build -tags "${tags}" -trimpath -ldflags "-w -s" -o "bin/video-smoke${ext}" "./cmd/video-smoke"
          go build -tags "${tags}" -trimpath -ldflags "-w -s" -o "bin/audio-smoke${ext}" "./cmd/audio-smoke"
          go build -tags "${tags}" -trimpath -ldflags "-w -s" -o "bin/annotation-export-smoke${ext}" "./cmd/annotation-export-smoke"
          go build -tags "${tags}" -trimpath -ldflags "-w -s" -o "bin/annotation-overlay-evidence-check${ext}" "./cmd/annotation-overlay-evidence-check"

      - name: Run desktop dependency doctor
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            CGO_ENABLED=1 go run -tags "${RNNOISE_TAG}" ./cmd/desktop-doctor -require-video -require-rnnoise
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            CGO_ENABLED=1 go run -tags "gtk3 ${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise
          else
            CGO_ENABLED=1 go run -tags "${RNNOISE_TAG}" ./cmd/desktop-doctor -require-rnnoise
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: recordingfreedom-${{ matrix.name }}
          path: ${{ env.APP_DIR }}/bin/**
          if-no-files-found: error
